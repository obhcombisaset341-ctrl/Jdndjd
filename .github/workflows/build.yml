name: Build Flutter APK

# Dipicu oleh github.js -> triggerWorkflow(browserUrl, tag, buildType)
# Inputs yang dikirim bot: zip_url, tag, build_type
on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL zip project Flutter (dari GitHub Release asset)"
        required: true
        type: string
      tag:
        description: "Tag unik build (dipakai untuk mencocokkan run)"
        required: true
        type: string
      build_type:
        description: "Mode build: release atau debug"
        required: false
        default: "release"
        type: string

# WAJIB: run-name harus memuat {{ inputs.tag }} supaya github.js
# (fungsi findRunByTag) bisa mencocokkan run yang baru dipicu.
run-name: "build-${{ inputs.tag }}"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Download project ZIP
        run: |
          curl -L -o project.zip "${{ inputs.zip_url }}"
          mkdir -p project
          unzip -q project.zip -d project

      - name: Locate pubspec.yaml root
        id: locate
        run: |
          PROJECT_DIR=$(dirname "$(find project -maxdepth 4 -name pubspec.yaml | head -n 1)")
          if [ -z "$PROJECT_DIR" ]; then
            echo "::error::pubspec.yaml tidak ditemukan di dalam ZIP!"
            exit 1
          fi
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Flutter pub get
        working-directory: ${{ steps.locate.outputs.dir }}
        run: flutter pub get

      - name: Build APK (release)
        if: ${{ inputs.build_type == 'release' }}
        working-directory: ${{ steps.locate.outputs.dir }}
        run: flutter build apk --release

      - name: Build APK (debug)
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: ${{ steps.locate.outputs.dir }}
        run: flutter build apk --debug

      - name: Collect APK output
        id: collect
        run: |
          mkdir -p out
          find "${{ steps.locate.outputs.dir }}/build/app/outputs" -name "*.apk" -exec cp {} out/ \;
          ls -la out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.tag }}
          path: out/*.apk
          retention-days: 1

