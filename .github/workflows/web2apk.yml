name: Build Web2APK

# Dipicu oleh github.js -> triggerWeb2ApkWorkflow(webUrl, appName, iconUrl)
# Inputs yang dikirim bot: web_url, app_name, icon_url, tag
on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "URL website yang akan dibungkus jadi APK (WebView)"
        required: true
        type: string
      app_name:
        description: "Nama aplikasi yang ditampilkan"
        required: true
        type: string
      icon_url:
        description: "URL icon.png untuk launcher icon (opsional)"
        required: false
        default: ""
        type: string
      tag:
        description: "Tag unik build (dipakai untuk mencocokkan run)"
        required: true
        type: string

# WAJIB: run-name harus memuat {{ inputs.tag }} supaya github.js
# (fungsi findRunByTag) bisa mencocokkan run yang baru dipicu.
run-name: "web2apk-${{ inputs.tag }}"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      # Repo ini sendiri berisi template Flutter WebView generik
      # (folder webview_template/ dengan pubspec.yaml, main.dart, dst).
      - name: Checkout template
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Copy template to build dir
        run: cp -r webview_template build_project

      - name: Inject web_url ke main.dart
        working-directory: build_project
        run: |
          sed -i "s|__WEB_URL__|${{ inputs.web_url }}|g" lib/main.dart

      - name: Set app name (pubspec + Android/iOS label)
        working-directory: build_project
        run: |
          sed -i "s|^name: .*|name: ${{ inputs.app_name }}|" pubspec.yaml || true
          find android -name "AndroidManifest.xml" -exec \
            sed -i "s|android:label=\"[^\"]*\"|android:label=\"${{ inputs.app_name }}\"|g" {} \;

      - name: Download & apply custom icon
        if: ${{ inputs.icon_url != '' }}
        working-directory: build_project
        run: |
          mkdir -p assets/icon
          curl -L -o assets/icon/icon.png "${{ inputs.icon_url }}"

      - name: Flutter pub get
        working-directory: build_project
        run: flutter pub get

      - name: Generate launcher icons
        if: ${{ inputs.icon_url != '' }}
        working-directory: build_project
        run: dart run flutter_launcher_icons

      - name: Build APK (release)
        working-directory: build_project
        run: flutter build apk --release

      - name: Collect APK output
        run: |
          mkdir -p out
          find build_project/build/app/outputs -name "*.apk" -exec cp {} out/ \;
          ls -la out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.tag }}
          path: out/*.apk
          retention-days: 1

